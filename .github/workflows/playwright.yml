name: Playwright Tests
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: lts/*
    - name: Install dependencies
      run: npm ci
    - name: Start Mokapi
      run: |
          docker run -d --rm --name mokapi -p 80:80 -p 8080:8080 -p 9092:9092 -v ${{ github.workspace }}/mocks:/mocks mokapi/mokapi:latest /mocks
          sleep 5  # Ensure Mokapi is running
    - name: Check Mokapi health
      run: |    
          curl -v http://localhost:8080/health
    - name: Start backend server
      run: nohup node backend/index.js > backend.log 2>&1 &
          echo $! > backend.pid
    - name: Install Playwright Browsers
      run: npx playwright install --with-deps
    - name: Run Playwright tests
      run: npx playwright test
      env:
        TEST_USER_EMAIL: ${{ secrets.TEST_USER_EMAIL }}
        TEST_USER_PASSWORD: ${{ secrets.TEST_USER_PASSWORD }}
    - uses: actions/upload-artifact@v4
      if: ${{ !cancelled() }}
      with:
        name: playwright-report
        path: playwright-report/
        retention-days: 30
    - name: Run Postman Collection
    - run: postman app test --command "npx playwright test"
    - uses: actions/postman-cli-action@v1
    - name: Stop Mokapi
      run: docker stop mokapi
    - name: Check backend logs
      run: |
          cat backend.log
    - name: Stop backend server
      run: |
        kill $(cat backend.pid) || true