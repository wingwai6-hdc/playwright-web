name: Playwright Tests
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    environment: QA
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: lts/*
    - name: Install dependencies
      run: npm ci
    - name: Start Mokapi
      run: |
          docker run -d --rm --name mokapi -p 80:80 -p 8080:8080 -p 9092:9092 -v ${{ github.workspace }}/mocks:/mocks mokapi/mokapi:latest /mocks
          sleep 5  # Ensure Mokapi is running
    - name: Check Mokapi health
      run: |    
          curl -v http://localhost:8080/health
    - name: Debug environment variables
      run: |
        echo "TEST_USER_EMAIL is set: ${{ secrets.TEST_USER_EMAIL != '' }}"
        echo "TEST_USER_EMAIL length: ${{ github.event_name == 'push' && 'hidden' || 'hidden' }}"
        # 安全地打印变量（仅用于调试）
        if [ -n "$TEST_USER_EMAIL" ]; then
          echo "✅ TEST_USER_EMAIL is set in CI process"
        else
          echo "❌ TEST_USER_EMAIL is NOT set in CI process"
        fi
      env:
          TEST_USER_EMAIL: ${{ secrets.TEST_USER_EMAIL }}
    - name: Start backend server
      run: nohup node backend/index.js > backend.log 2>&1 &
          echo $! > backend.pid
    - name: Install Playwright Browsers
      run: npx playwright install --with-deps
    - name: Run Playwright tests
      run: npx playwright test login.spec.ts
      env:
        TEST_USER_EMAIL: ${{ secrets.TEST_USER_EMAIL }}
        TEST_USER_PASSWORD: ${{ secrets.TEST_USER_PASSWORD }}
    - uses: actions/upload-artifact@v4
      if: ${{ !cancelled() }}
      with:
        name: playwright-report
        path: playwright-report/
        retention-days: 30
    - name: Run Postman Collection
      uses: postmanlabs/postman-cli-action@v1
      with:
        command: 'postman app test'
        api-key: ${{ secrets.POSTMAN_API_KEY }}
    - name: Stop Mokapi
      run: docker stop mokapi
    - name: Check backend logs
      run: |
          cat backend.log
    - name: Stop backend server
      run: |
        kill $(cat backend.pid) || true